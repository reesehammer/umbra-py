site_name: umbra-py
site_description: >-
  A Python-first toolkit to make Umbra SAR open data easy to discover, load,
  download, and analyze.
site_url: https://reesehammer.github.io/umbra-py/
repo_url: https://github.com/reesehammer/umbra-py
repo_name: reesehammer/umbra-py
copyright: >-
  Documentation licensed Apache-2.0. Umbra imagery is CC BY 4.0
  &copy; Umbra Lab, Inc.

# The strategy/analysis Markdown under docs/ is internal planning, not the user
# manual; the published site is authored separately here.
docs_dir: docs_src

theme:
  name: material
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.top
    - navigation.sections
    - content.code.copy
    - content.code.annotate
    - toc.follow
    - search.suggest
    - search.highlight
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          options:
            docstring_style: google
            show_source: false
            show_root_heading: true
            show_root_full_path: false
            show_symbol_type_heading: true
            show_symbol_type_toc: true
            separate_signature: true
            signature_crossrefs: true
            merge_init_into_class: true
            filters:
              - "!^_"
            members_order: source

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.details
  - mkdocs-click

nav:
  - Home: index.md
  - Install: install.md
  - Quickstart: quickstart.md
  - Example notebooks: guides/notebooks.md
  - CLI reference: cli.md
  - API reference:
      - Catalog search: reference/catalog.md
      - Local index: reference/index.md
      - Items & collections: reference/models.md
      - Download: reference/download.md
      - Convert (SICD → COG): reference/convert.md
      - Terrain (DEM & geoid): reference/terrain.md
      - Load & xarray: reference/load.md
      - Visualize & map: reference/viz.md
      - ML chips & export: reference/chips.md
      - AI features: reference/ai.md
      - Errors: reference/exceptions.md
