name: Release

# Publish to PyPI when a GitHub Release is published. Uses PyPI Trusted
# Publishing (OIDC) — no long-lived API token is stored in the repo; PyPI
# verifies the workflow's identity directly. Tag the release `vX.Y.Z` to match
# the single-sourced `__version__` (checked below before anything is uploaded).
on:
  release:
    types: [published]
  # Allow a dry run (build + verify, no publish) from the Actions tab.
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build distributions
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tooling
        run: python -m pip install --upgrade build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check metadata renders on PyPI
        run: python -m twine check dist/*

      # Fail loudly if the release tag and the package version disagree, so a
      # mistagged release never ships under the wrong version.
      - name: Verify tag matches package version
        if: github.event_name == 'release'
        run: |
          pkg_version="$(ls dist/*.tar.gz | sed -E 's/.*umbra_py-(.*)\.tar\.gz/\1/')"
          tag="${GITHUB_REF_NAME#v}"
          echo "Package version: $pkg_version"
          echo "Release tag:     $tag"
          if [ "$pkg_version" != "$tag" ]; then
            echo "::error::Release tag ($tag) does not match package version ($pkg_version)."
            exit 1
          fi

      - name: Upload distributions artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    # Only publish on a real published release, never on a manual dry run.
    if: github.event_name == 'release'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/umbra-py/
    permissions:
      # Required for PyPI Trusted Publishing (OIDC).
      id-token: write
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
