name: Publish catalog index

# Umbra publishes no STAC API, so searching its open-data catalog normally
# means crawling the S3 bucket. This workflow does that crawl once on a
# schedule — `umbra index build` over the whole bucket — then publishes the
# result in two forms on the rolling `catalog-index` release:
#
#   - umbra-open-data.parquet  stac-geoparquet: the whole catalog searchable
#                              in seconds by DuckDB / geopandas / pyarrow /
#                              rustac, no umbra-py install required
#   - catalog.db               the SQLite index, ready for
#                              `umbra search --local --db catalog.db`
#   - catalog.pmtiles          a single-file whole-catalog vector-tile basemap
#                              (`umbra tiles --fetch`): drop straight onto a
#                              static host, or read by range request from a
#                              MapLibre page — a whole-archive map, no crawl
#   - catalog.html             a ready-to-open MapLibre GL viewer that reads the
#                              published catalog.pmtiles by range request
#
# Weekly is deliberate: frequent enough to pick up new acquisitions, polite
# to Umbra's open-data bucket.

on:
  schedule:
    - cron: "17 6 * * 1" # Mondays 06:17 UTC, off the whole-hour spike
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    # Don't crawl Umbra's bucket from forks; schedules there stay off anyway.
    if: github.repository == 'reesehammer/umbra-py'
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install umbra-py with the export extra
        run: pip install -e ".[export]"

      - name: Build full catalog index
        run: umbra index build --db catalog.db

      - name: Export stac-geoparquet
        run: umbra index export --db catalog.db --out umbra-open-data.parquet

      # Tile the whole catalog into a single-file vector basemap from the index
      # just built (--local, no second crawl), plus a MapLibre viewer pointed at
      # the *published* pmtiles URL so catalog.html works standalone once both
      # land on the release.
      - name: Tile whole-catalog PMTiles basemap
        run: |
          umbra tiles --local --db catalog.db --out catalog.pmtiles
          python -c "import umbra_py.pmtiles as p, umbra_py.constants as c; \
          p.save_viewer(c.CATALOG_INDEX_PMTILES_URL, 'catalog.html')"

      - name: Publish to the rolling catalog-index release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          summary="$(umbra index info --db catalog.db)"
          notes="Rolling snapshot of Umbra's open-data STAC catalog \
          (rebuilt weekly; last rebuilt $(date -u +%Y-%m-%d)).

          - \`umbra-open-data.parquet\` — [stac-geoparquet](https://stac-geoparquet.org/): query it directly with DuckDB, geopandas, pyarrow or rustac.
          - \`catalog.db\` — SQLite index for \`umbra search --local --db catalog.db\`.
          - \`catalog.pmtiles\` — single-file whole-catalog vector basemap for \`umbra tiles --fetch\`; drop onto any static host or read by range request from a MapLibre page.
          - \`catalog.html\` — a ready-to-open MapLibre GL viewer over the published \`catalog.pmtiles\`.

          \`\`\`
          $summary
          \`\`\`

          Data © [Umbra](https://umbra.space/open-data/), CC BY 4.0."
          if gh release view catalog-index >/dev/null 2>&1; then
            gh release edit catalog-index --notes "$notes"
          else
            gh release create catalog-index \
              --title "Umbra open-data catalog index" --notes "$notes"
          fi
          gh release upload catalog-index \
            catalog.db umbra-open-data.parquet catalog.pmtiles catalog.html --clobber
