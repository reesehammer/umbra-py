name: CI

on:
  push:
    branches: [main]
  pull_request:

# A superseded push's runs are dead feedback; cancel them.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install package
        run: uv pip install --system -e ".[dev]"

      - name: Lint
        run: ruff check .

      - name: Format check
        run: ruff format --check .

      - name: Test (offline)
        run: pytest -q

  # The core matrix installs only [dev], so every test needing an optional
  # extra (viz / load / convert / export) importorskips there — silently.
  # This job installs everything so those tests actually run on every PR.
  test-all-extras:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true
          cache-dependency-glob: pyproject.toml

      - name: Install package with all extras
        run: uv pip install --system -e ".[dev,all,mcp]"

      - name: Test (offline, all extras)
        run: pytest -q
